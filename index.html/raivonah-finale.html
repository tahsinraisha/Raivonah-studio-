<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Raivonah — Let's Build Something Exceptional</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --deep:#000;--surface:#050508;
  --blue:#3B82F6;--indigo:#6366F1;--violet:#8B5CF6;--purple:#A855F7;
  --text-1:#F8F8FF;--text-2:#9090A8;--text-3:#42425A;--text-4:#1E1E2E;
  --grad:linear-gradient(135deg,#3B82F6 0%,#6366F1 45%,#8B5CF6 100%);
}
html,body{background:var(--deep);color:var(--text-1);
  font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
  overflow-x:hidden;margin:0}

/* ══════════════════════════════
   FINALE SECTION
══════════════════════════════ */
#finale{
  position:relative;
  min-height:100vh;
  border-top:1px solid rgba(99,102,241,.08);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;
  background:#000;
}

/* ── CANVAS LAYERS ── */
#c-blueprint { position:absolute;inset:0;z-index:1;pointer-events:none; }
#c-ecosystem  { position:absolute;inset:0;z-index:2;pointer-events:none; }
#c-particles  { position:absolute;inset:0;z-index:3;pointer-events:none; }
#c-logo       { position:absolute;inset:0;z-index:4;pointer-events:none; }

/* ── CONTENT ── */
.finale-content{
  position:relative;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;
  text-align:center;
  padding:clamp(60px,10vw,140px) clamp(24px,5vw,80px);
  max-width:900px;
  width:100%;
}

/* Logo wordmark */
.finale-logo{
  font-size:clamp(.7rem,1vw,.875rem);font-weight:700;letter-spacing:.22em;
  text-transform:uppercase;color:var(--text-3);margin-bottom:clamp(28px,4vw,48px);
  opacity:0;
  display:flex;align-items:center;gap:12px;
}
.finale-logo-line{width:28px;height:1px;background:linear-gradient(90deg,transparent,rgba(99,102,241,.4))}
.finale-logo-line.r{background:linear-gradient(90deg,rgba(99,102,241,.4),transparent)}
.finale-logo .g{
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* Eyebrow */
.finale-eyebrow{
  font-size:.5375rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
  color:var(--text-3);opacity:0;margin-bottom:20px;
  display:flex;align-items:center;gap:10px;
}
.finale-eyebrow-dot{
  width:5px;height:5px;border-radius:50%;background:var(--grad);
  box-shadow:0 0 10px rgba(99,102,241,.7);
  animation:eyebrowPulse 2s ease-in-out infinite;
}
@keyframes eyebrowPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.6);opacity:.5}}

/* Main headline */
.finale-headline{
  font-size:clamp(2.8rem,6.5vw,6.5rem);
  font-weight:900;letter-spacing:-.045em;line-height:.95;
  color:var(--text-1);
  text-shadow:0 0 80px rgba(0,0,0,.8),0 2px 4px rgba(0,0,0,.6);
  margin-bottom:clamp(16px,2.5vw,28px);
  opacity:0;
}
.finale-headline .word{
  display:inline-block;
  overflow:hidden;
}
.finale-headline .word-inner{
  display:inline-block;
  transform:translateY(110%);
}
.finale-headline .g{
  background:var(--grad);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 30px rgba(99,102,241,.5));
}

/* Sub */
.finale-sub{
  font-size:clamp(.9rem,1.3vw,1.125rem);color:var(--text-2);line-height:1.72;
  max-width:520px;margin:0 auto clamp(36px,5vw,56px);
  font-weight:400;opacity:0;transform:translateY(16px);
}

/* Buttons */
.finale-btns{
  display:flex;align-items:center;gap:14px;justify-content:center;
  flex-wrap:wrap;margin-bottom:clamp(40px,5vw,60px);
  opacity:0;transform:translateY(14px);
}
.f-btn{
  display:inline-flex;align-items:center;gap:8px;
  font-family:inherit;font-size:.9375rem;font-weight:700;letter-spacing:-.01em;
  padding:15px 32px;border-radius:12px;cursor:pointer;
  transition:all .3s cubic-bezier(.16,1,.3,1);border:none;
  position:relative;overflow:hidden;
}
.f-btn::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.1),transparent 55%);
  opacity:0;transition:opacity .25s}
.f-btn:hover::after{opacity:1}
.f-btn:hover{transform:translateY(-3px)}
.f-btn-p{
  background:var(--grad);color:#fff;font-size:1rem;padding:17px 36px;
  box-shadow:0 6px 36px rgba(99,102,241,.45),0 0 0 1px rgba(99,102,241,.3);
}
.f-btn-p:hover{box-shadow:0 10px 48px rgba(99,102,241,.55),0 0 0 1px rgba(99,102,241,.4)}
.f-btn-g{
  background:rgba(255,255,255,.04);color:var(--text-1);
  border:1px solid rgba(255,255,255,.1);
}
.f-btn-g:hover{background:rgba(255,255,255,.07);border-color:rgba(99,102,241,.35)}
.f-btn-arr{display:inline-block;transition:transform .28s cubic-bezier(.34,1.56,.64,1)}
.f-btn:hover .f-btn-arr{transform:translateX(5px)}

/* Social icons */
.finale-social{
  display:flex;align-items:center;gap:10px;justify-content:center;
  opacity:0;transform:translateY(10px);
}
.sociale-label{font-size:.5375rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-right:6px}
.s-icon{
  width:42px;height:42px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);
  cursor:pointer;color:var(--text-3);
  transition:all .28s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden;
}
.s-icon::before{content:'';position:absolute;inset:0;background:var(--grad);opacity:0;transition:opacity .28s}
.s-icon:hover{border-color:transparent;transform:translateY(-4px) scale(1.12);color:#fff}
.s-icon:hover::before{opacity:1}
.s-icon svg{position:relative;z-index:1;transition:transform .2s}
.s-icon:hover svg{transform:scale(1.15)}

/* ── FOOTER NAV ── */
.finale-footer{
  position:absolute;bottom:clamp(24px,4vh,40px);left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(24px,5vw,64px);
  z-index:10;opacity:0;
}
.ff-copy{font-size:.5rem;font-weight:500;letter-spacing:.08em;color:var(--text-4)}
.ff-copy .g{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:700}
.ff-links{display:flex;gap:20px}
.ff-link{font-size:.5rem;font-weight:500;letter-spacing:.04em;color:var(--text-4);text-decoration:none;
  transition:color .2s}
.ff-link:hover{color:var(--text-2)}

/* ── SCROLL PROGRESS BAR ── */
.progress-bar{
  position:fixed;top:0;left:0;height:1px;z-index:200;
  background:var(--grad);transform-origin:left;transform:scaleX(0);
  transition:transform .1s linear;
}

/* ── CURSOR GLOW ── */
.cursor-glow{
  position:fixed;width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(99,102,241,.06) 0%,transparent 70%);
  pointer-events:none;z-index:200;
  transform:translate(-50%,-50%);
  transition:transform .08s linear;
}

/* Responsive */
@media(max-width:600px){
  .finale-btns{flex-direction:column;align-items:stretch}
  .f-btn{justify-content:center}
  .finale-footer{flex-direction:column;gap:12px;align-items:center}
}
</style>
</head>
<body>

<section id="finale">

  <!-- Canvas layers -->
  <canvas id="c-blueprint"></canvas>
  <canvas id="c-ecosystem"></canvas>

  <!-- Content -->
  <div class="finale-content" id="finale-content">

    <div class="finale-logo" id="fn-logo">

      </button>
      <button class="s-icon" aria-label="Instagram">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>

      <button class="s-icon" aria-label="GitHub">

      </button>

  </div>

  <!-- Footer -->
  <div class="finale-footer" id="fn-footer">

      <a class="ff-link" href="#">Privacy</a>

    </div>
  </div>

</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js"></script>
<script>
const {gsap} = window;
CustomEase.create("expo","0.16,1,0.3,1");
CustomEase.create("cinema","0.22,1,0.36,1");
CustomEase.create("spring","0.34,1.56,0.64,1");

const lerp = (a,b,t) => a+(b-a)*t;
const clamp = (v,a,b) => Math.max(a,Math.min(b,v));
const rand = (a,b) => a+Math.random()*(b-a);
function rgba(r,g,b,a){ return 'rgba('+r+','+g+','+b+','+a+')'; }

// ─────────────────────────────────────────────
//  CANVAS SETUP
// ─────────────────────────────────────────────
const canvases = ['c-blueprint','c-ecosystem','c-particles','c-logo']
  .map(id => {
    const c = document.getElementById(id);
    return { el:c, ctx:c.getContext('2d') };
  });

let W, H, CX, CY;
function resize(){
  W = window.innerWidth; H = window.innerHeight;
  CX = W/2; CY = H/2;
  canvases.forEach(({el}) => { el.width=W; el.height=H; });
}
resize();
window.addEventListener('resize', resize);

// ─────────────────────────────────────────────
//  CURSOR GLOW
// ─────────────────────────────────────────────
const cursorGlow = document.getElementById('cursor-glow');
let mx = W/2, my = H/2, smx = W/2, smy = H/2;
window.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
(function cursorTick(){
  smx=lerp(smx,mx,.08); smy=lerp(smy,my,.08);
  cursorGlow.style.transform='translate('+smx+'px,'+smy+'px) translate(-50%,-50%)';
  requestAnimationFrame(cursorTick);
})();

// ─────────────────────────────────────────────
//  SCROLL PROGRESS
// ─────────────────────────────────────────────
const progressBar = document.getElementById('progress-bar');
window.addEventListener('scroll',()=>{
  const pct = window.scrollY/(document.documentElement.scrollHeight-window.innerHeight)||0;
  progressBar.style.transform='scaleX('+clamp(pct,0,1)+')';
},{passive:true});

// ─────────────────────────────────────────────
//  LAYER 1 · BLUEPRINT (background convergence)
// ─────────────────────────────────────────────
const bp = canvases[0];
const bpLines = [];
const bpNodes = [];
const bpPackets = [];

// Blueprint grid lines radiating from edges
function initBlueprint(){
  // Horizontal convergence lines from sides
  for(let i=0;i<20;i++){
    const y = H*(i/19);
    bpLines.push({
      type:'h',
      x1:0, y1:y, x2:W, y2:y,
      progress:0, speed:rand(.0008,.002),
      alpha:rand(.04,.1),delay:rand(0,.8),
      converge:rand(.3,.7), // at what progress they arc toward center
    });
  }
  // Vertical convergence lines
  for(let i=0;i<14;i++){
    const x = W*(i/13);
    bpLines.push({
      type:'v',
      x1:x, y1:0, x2:x, y2:H,
      progress:0, speed:rand(.001,.0025),
      alpha:rand(.03,.08),delay:rand(0,.6),
    });
  }
  // Blueprint node crosses at intersections
  for(let xi=0;xi<8;xi++){
    for(let yi=0;yi<6;yi++){
      const x=W*(xi/7), y=H*(yi/5);
      bpNodes.push({
        x,y,alpha:0,targetAlpha:rand(.1,.35),
        delay:rand(0,1),size:rand(3,6),born:false,
      });
    }
  }
  // Blueprint motion path packets
  for(let i=0;i<30;i++){
    const edge=Math.floor(rand(0,4));
    let sx,sy;
    if(edge===0){sx=rand(0,W);sy=0}
    else if(edge===1){sx=W;sy=rand(0,H)}
    else if(edge===2){sx=rand(0,W);sy=H}
    else{sx=0;sy=rand(0,H)}
    bpPackets.push({
      sx,sy,t:rand(0,1),speed:rand(.001,.003),
      col:[99,102,241],size:rand(1,2.5),alpha:rand(.3,.7),
      delay:rand(0,1.5),active:false,
    });
  }
}
initBlueprint();

// ─────────────────────────────────────────────
//  LAYER 2 · ECOSYSTEM (tech nodes converge)
// ─────────────────────────────────────────────
const eco = canvases[1];
const TECH_NODES = [
  {label:'React',    col:[97,218,251],  angle:Math.PI*(.1),  orbitR:.42, phase:0 },
  {label:'Next.js',  col:[255,255,255], angle:Math.PI*(.3),  orbitR:.38, phase:.3},
  {label:'TypeScript',col:[49,120,198],angle:Math.PI*(.5),  orbitR:.44, phase:.7},
  {label:'Tailwind', col:[56,189,248],  angle:Math.PI*(.7),  orbitR:.4,  phase:1.1},
  {label:'Framer',   col:[187,79,200],  angle:Math.PI*(.9),  orbitR:.45, phase:1.5},
  {label:'GSAP',     col:[136,206,2],   angle:Math.PI*(1.1), orbitR:.38, phase:1.9},
  {label:'Node.js',  col:[104,160,99],  angle:Math.PI*(1.3), orbitR:.42, phase:2.3},
  {label:'Supabase', col:[62,207,142],  angle:Math.PI*(1.5), orbitR:.4,  phase:2.7},
  {label:'Vercel',   col:[255,255,255], angle:Math.PI*(1.75),orbitR:.38, phase:3.1},
];
// Each node starts at orbit position, then "converges" to center over animation
const ecoNodes = TECH_NODES.map(t => ({
  ...t,
  px:0,py:0,   // current position
  convergeFactor:0, // 0 = orbit, 1 = at center
}));

// ─────────────────────────────────────────────
//  LAYER 3 · PARTICLES (energy field)
// ─────────────────────────────────────────────
const parts = canvases[2];
const particles = [];
function initParticles(){
  for(let i=0;i<200;i++){
    // Some start at edges, some scattered
    const fromEdge = Math.random() > .4;
    const angle = rand(0, Math.PI*2);
    const dist = fromEdge ? rand(.4,.8) : rand(.1,.9);
    particles.push({
      x: W/2 + Math.cos(angle)*dist*W*.6,
      y: H/2 + Math.sin(angle)*dist*H*.6,
      vx:0,vy:0,
      targetX:W/2,targetY:H/2,
      r:rand(.3,2),
      a:rand(.05,.4),
      col:[rand(59,139),rand(102,92),rand(246,246)].map(Math.round),
      phase:rand(0,Math.PI*2),
      speed:rand(.0005,.003),
      converge:false,
      convergeProgress:0,
    });
  }
}
initParticles();

// ─────────────────────────────────────────────
//  LAYER 4 · LOGO (R letterform assembles)
// ─────────────────────────────────────────────
const logoCanvas = canvases[3];
// R paths: stem, bowl, leg — each as SVG-like point sets
// Using parametric drawing for smooth animation
let logoProgress = 0; // 0→1 controls assembly

function drawRLogo(ctx, cx, cy, size, progress, alpha){
  if(progress<=0||alpha<=0||size<=0)return;
  const p=clamp(progress,0,1);
  const a=clamp(alpha,0,1);
  const s=Math.max(size,1);

  ctx.save();
  ctx.globalAlpha=a;

  // Define R geometry relative to center
  const x0=cx-s*.28, y0=cy-s*.52;

  // Gradient for the entire R
  const grad=ctx.createLinearGradient(cx-s*.3,cy-s*.5,cx+s*.3,cy+s*.5);
  grad.addColorStop(0,'#3B82F6');
  grad.addColorStop(.45,'#6366F1');
  grad.addColorStop(1,'#8B5CF6');

  ctx.strokeStyle=grad;
  ctx.lineCap='round';
  ctx.lineJoin='round';
  ctx.lineWidth=Math.max(s*.11, 1);

  // STAGE 1: Stem (0→0.33)
  if(p>0){
    const stemP=clamp(p/.33,0,1);
    const stemY=y0+stemP*(s*1.04);
    ctx.beginPath();
    ctx.moveTo(x0,y0);
    ctx.lineTo(x0,stemY);
    ctx.stroke();
  }

  // STAGE 2: Bowl arc (0.25→0.65)
  if(p>0.25){
    const bowlP=clamp((p-.25)/.4,0,1);
    const bowlCX=cx+s*.08;
    const bowlCY=cy-s*.21;
    const bowlR=Math.max(s*.32, 0.1);
    const startAng=-Math.PI*.82;
    const endAng=Math.PI*.82;
    const sweepAng=endAng-startAng;
    ctx.beginPath();
    ctx.arc(bowlCX,bowlCY,bowlR,startAng,startAng+sweepAng*bowlP);
    ctx.stroke();
  }

  // STAGE 3: Leg (0.55→1.0)
  if(p>0.55){
    const legP=clamp((p-.55)/.45,0,1);
    const legSX=cx-s*.08, legSY=cy-s*.01;
    const legEX=cx+s*.3,  legEY=cy+s*.52;
    const cpX=cx+s*.1, cpY=cy+s*.18;
    ctx.beginPath();
    ctx.moveTo(legSX,legSY);
    ctx.quadraticCurveTo(
      legSX+(cpX-legSX)*legP,
      legSY+(cpY-legSY)*legP,
      legSX+(legEX-legSX)*legP,
      legSY+(legEY-legSY)*legP
    );
    ctx.stroke();
  }

  ctx.restore();

  // Glow aura behind R
  if(p>.5&&s>1){
    const glowA=Math.min((p-.5)/.5,.5)*a;
    const glowR=Math.max(s*.7, 1);
    const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,glowR);
    gr.addColorStop(0,rgba(99,102,241,glowA*.4));
    gr.addColorStop(1,'transparent');
    ctx.save();ctx.fillStyle=gr;ctx.fillRect(cx-glowR,cy-glowR,glowR*2,glowR*2);ctx.restore();
  }
}

// ─────────────────────────────────────────────
//  ANIMATION STATE
// ─────────────────────────────────────────────
let globalT = 0;
let phase = 'converging'; // converging → forming → complete
let phaseT = 0;
let contentShown = false;

// ─────────────────────────────────────────────
//  MASTER RENDER LOOP
// ─────────────────────────────────────────────
function renderFrame(){
  globalT += .01;
  phaseT  += .006;

  const convergeFactor = clamp(phaseT*.8, 0, 1);
  const eased = 1 - Math.pow(1-convergeFactor,3);

  // ── BLUEPRINT LAYER ──
  const bCtx = bp.ctx;
  bCtx.clearRect(0,0,W,H);

  // Grid lines (fade as convergence happens)
  bpLines.forEach((ln,i)=>{
    const t=Math.max(0, globalT-ln.delay);
    ln.progress = Math.min(t*ln.speed*100, 1);
    const fadeOut = 1 - eased*.85;
    const a = ln.alpha * Math.min(ln.progress*3,1) * fadeOut;
    if(a<=0)return;
    bCtx.save();
    bCtx.strokeStyle=rgba(99,102,241,a);
    bCtx.lineWidth=.5;
    if(ln.type==='h'){
      // Lines warp toward center as convergence increases
      const warpY = ln.y1 + (CY-ln.y1)*eased*.6;
      bCtx.beginPath();bCtx.moveTo(0,warpY);bCtx.lineTo(W,warpY);bCtx.stroke();
    }else{
      const warpX = ln.x1 + (CX-ln.x1)*eased*.6;
      bCtx.beginPath();bCtx.moveTo(warpX,0);bCtx.lineTo(warpX,H);bCtx.stroke();
    }
    bCtx.restore();
  });

  // Blueprint cross-nodes
  bpNodes.forEach(n=>{
    const t=Math.max(0,globalT-n.delay);
    if(t>0&&!n.born){n.born=true}
    if(!n.born)return;
    n.alpha=lerp(n.alpha,n.targetAlpha*(1-eased*.9),.04);
    if(n.alpha<.005)return;
    // Warp toward center
    const wx=n.x+(CX-n.x)*eased*.7;
    const wy=n.y+(CY-n.y)*eased*.7;
    const s=n.size*(1-eased*.3);
    bCtx.save();bCtx.strokeStyle=rgba(99,102,241,n.alpha);bCtx.lineWidth=.5;
    bCtx.beginPath();bCtx.moveTo(wx-s,wy);bCtx.lineTo(wx+s,wy);bCtx.stroke();
    bCtx.beginPath();bCtx.moveTo(wx,wy-s);bCtx.lineTo(wx,wy+s);bCtx.stroke();
    bCtx.restore();
  });

  // Blueprint packets flying to center
  bpPackets.forEach(pk=>{
    const t=Math.max(0,globalT-pk.delay);
    if(t<=0)return;
    pk.t=Math.min(pk.t+pk.speed*2,1);
    if(pk.t>=1)pk.t=0;
    const x=pk.sx+(CX-pk.sx)*pk.t;
    const y=pk.sy+(CY-pk.sy)*pk.t;
    const life=Math.sin(pk.t*Math.PI);
    bCtx.save();
    bCtx.fillStyle=rgba(...pk.col,pk.alpha*life);
    bCtx.shadowBlur=pk.size*3;bCtx.shadowColor=rgba(...pk.col,.4);
    bCtx.beginPath();bCtx.arc(x,y,Math.max(pk.size*.6*life,.1),0,Math.PI*2);bCtx.fill();
    // Trail
    for(let tr=1;tr<=3;tr++){
      const tt=Math.max(0,pk.t-tr*.025);
      const tx=pk.sx+(CX-pk.sx)*tt, ty=pk.sy+(CY-pk.sy)*tt;
      bCtx.fillStyle=rgba(...pk.col,pk.alpha*life*(1-tr*.28));
      bCtx.shadowBlur=0;
      bCtx.beginPath();bCtx.arc(tx,ty,Math.max(pk.size*.4*(1-tr*.2),.1),0,Math.PI*2);bCtx.fill();
    }
    bCtx.restore();
  });

  // ── ECOSYSTEM LAYER ──
  const eCtx = eco.ctx;
  eCtx.clearRect(0,0,W,H);

  ecoNodes.forEach((n,i)=>{
    const delayedT = Math.max(0, phaseT - i*.05);
    n.convergeFactor = clamp(delayedT*.5, 0, 1);
    const cf = n.convergeFactor;
    const easedCF = 1-Math.pow(1-cf,3);

    // Orbit position with natural float
    const orbitX = CX + Math.cos(n.angle + globalT*.18 + n.phase) * n.orbitR * W*.45;
    const orbitY = CY + Math.sin(n.angle + globalT*.15 + n.phase) * n.orbitR * H*.38;

    // Converge toward center
    const px = lerp(orbitX, CX, easedCF*.92);
    const py = lerp(orbitY, CY, easedCF*.92);
    n.px = px; n.py = py;

    const nodeAlpha = (1 - easedCF*.95) * Math.min(delayedT*2,1);
    if(nodeAlpha <= .005) return;

    // Connection line to center
    const lineAlpha = nodeAlpha * .35;
    const grad = eCtx.createLinearGradient(px,py,CX,CY);
    grad.addColorStop(0, rgba(...n.col, lineAlpha));
    grad.addColorStop(1, rgba(99,102,241, lineAlpha*.5));
    eCtx.save();
    eCtx.strokeStyle=grad; eCtx.lineWidth=.7;
    eCtx.beginPath(); eCtx.moveTo(px,py); eCtx.lineTo(CX,CY); eCtx.stroke();
    eCtx.restore();

    // Glow halo
    const hr = Math.max(30 + Math.sin(globalT+n.phase)*8, 1);
    const hg = eCtx.createRadialGradient(px,py,0,px,py,hr);
    hg.addColorStop(0, rgba(...n.col, nodeAlpha*.12));
    hg.addColorStop(1,'transparent');
    eCtx.save();eCtx.fillStyle=hg;eCtx.fillRect(px-hr,py-hr,hr*2,hr*2);eCtx.restore();

    // Node dot
    eCtx.save();
    eCtx.fillStyle=rgba(...n.col, nodeAlpha*.9);
    eCtx.shadowBlur=12;eCtx.shadowColor=rgba(...n.col,.6);
    eCtx.beginPath();eCtx.arc(px,py,Math.max(4+Math.sin(globalT*1.2+n.phase),0.5),0,Math.PI*2);eCtx.fill();

    // Label
    if(nodeAlpha>.25&&easedCF<.6){
      eCtx.font='600 10px Inter,system-ui';
      eCtx.fillStyle=rgba(248,248,255,nodeAlpha*.75);
      eCtx.textAlign='center';eCtx.textBaseline='middle';
      eCtx.shadowBlur=0;
      eCtx.fillText(n.label,px,py-16);
    }
    eCtx.restore();
  });

  // ── PARTICLES LAYER ──
  const pCtx = parts.ctx;
  pCtx.clearRect(0,0,W,H);

  particles.forEach((p,i)=>{
    const delayedT=Math.max(0,phaseT-i*.004);
    const cf=clamp(delayedT*.7,0,1);
    const easedCF=1-Math.pow(1-cf,4);

    // Move toward center
    const tx=lerp(p.x,CX,easedCF*.98);
    const ty=lerp(p.y,CY,easedCF*.98);

    // Alive until very close
    const distToCenter=Math.sqrt((tx-CX)**2+(ty-CY)**2);
    const fadeNear=clamp(distToCenter/60,0,1);
    const alpha=p.a * Math.min(delayedT*3,1) * fadeNear;

    if(alpha<.005) return;

    const pulse=Math.sin(globalT*1.5+p.phase)*.5+.5;
    pCtx.save();
    pCtx.fillStyle=rgba(...p.col, alpha*(0.6+pulse*.4));
    pCtx.shadowBlur=p.r*4;pCtx.shadowColor=rgba(...p.col,.3);
    pCtx.beginPath();pCtx.arc(tx,ty,Math.max(p.r,.1),0,Math.PI*2);pCtx.fill();
    pCtx.restore();
  });

  // ── LOGO LAYER ──
  const lCtx = logoCanvas.ctx;
  lCtx.clearRect(0,0,W,H);

  // Logo forms after convergence is well advanced
  const logoStartT = .65;
  const logoFactor = clamp((convergeFactor-logoStartT)/(.35),0,1);
  logoProgress = 1-Math.pow(1-logoFactor,2);

  // Responsive size
  const logoSize = Math.min(W,H) * (window.innerWidth < 600 ? .28 : .2);
  drawRLogo(lCtx, CX, CY, logoSize, logoProgress, Math.min(logoFactor*3,1));

  // After logo is formed, show content
  if(logoFactor > .60 && !contentShown){
    contentShown = true;
    showContent();
  }

  requestAnimationFrame(renderFrame);
}
renderFrame();

// ─────────────────────────────────────────────
//  CONTENT REVEAL SEQUENCE
// ─────────────────────────────────────────────
function showContent(){
  const tl = gsap.timeline({defaults:{ease:'expo'}});

  // Logo fades out as wordmark comes in
  tl.to('#fn-logo',     {opacity:1,duration:.5},0)
    .to('#fn-eyebrow',  {opacity:1,duration:.4},'.1')
    .to('#fn-headline', {opacity:1,duration:.01},'.2')
    .to('.word-inner',  {y:'0%',duration:.7,stagger:.09,ease:'cinema'},'.2')
    .to('#fn-sub',      {opacity:1,y:0,duration:.55},'.55')
    .to('#fn-btns',     {opacity:1,y:0,duration:.45},'.68')
    .to('#fn-social',   {opacity:1,y:0,duration:.4},'.78')
    .to('#fn-footer',   {opacity:1,duration:.4},'.88');

  // Buttons magnetic effect after reveal
  tl.call(()=>{
    document.querySelectorAll('.f-btn').forEach(btn=>{
      btn.addEventListener('mousemove',e=>{
        const r=btn.getBoundingClientRect();
        const dx=(e.clientX-(r.left+r.width/2))*.18;
        const dy=(e.clientY-(r.top+r.height/2))*.18;
        gsap.to(btn,{x:dx,y:dy,duration:.3,ease:'expo'});
      });
      btn.addEventListener('mouseleave',()=>{
        gsap.to(btn,{x:0,y:0,duration:.5,ease:'expo'});
      });
    });
  },'1.2');
}

// ─────────────────────────────────────────────
//  KICK OFF — trigger convergence on scroll into view
// ─────────────────────────────────────────────
const section=document.getElementById('finale');
const obs=new IntersectionObserver(entries=>{
  if(entries[0].isIntersecting){
    phaseT=0;contentShown=false;
    obs.disconnect();
  }
},{threshold:.15});
obs.observe(section);
// Also auto-start for standalone demo
phaseT = 0;
</script>
