<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Raivonah — Services</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#3B82F6;--indigo:#6366F1;--violet:#8B5CF6;--purple:#A855F7;
  --deep:#050508;--surface:#0A0A0F;--elevated:#0D0D16;--muted:#1A1A24;
  --border-s:rgba(255,255,255,.055);--border-d:rgba(255,255,255,.08);
  --text-1:#F8F8FF;--text-2:#A0A0B8;--text-3:#5A5A78;--text-4:#32324A;
  --grad:linear-gradient(135deg,#3B82F6 0%,#6366F1 45%,#8B5CF6 100%);
  --grad-r:linear-gradient(135deg,#8B5CF6 0%,#6366F1 55%,#3B82F6 100%);
}
html,body{
  background:var(--deep);color:var(--text-1);
  font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ══════════════════════════════
   SECTION SHELL
══════════════════════════════ */
#services{
  position:relative;
  padding:clamp(80px,10vw,140px) clamp(24px,5vw,80px);
  overflow:hidden;
}

/* Deep ambient background */
.svc-bg{
  position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 20% 30%,rgba(59,130,246,.04) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 70%,rgba(139,92,246,.045) 0%,transparent 55%),
    radial-gradient(ellipse 80% 60% at 50% 50%,rgba(99,102,241,.025) 0%,transparent 65%);
}

/* Blueprint grid overlay */
.svc-grid-bg{
  position:absolute;inset:0;z-index:0;opacity:.3;
  background-image:
    linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px);
  background-size:80px 80px;
  mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 30%,transparent 80%);
}

/* ── HEADER ── */
.svc-header{
  position:relative;z-index:2;
  max-width:1200px;margin:0 auto;
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:40px;margin-bottom:clamp(56px,7vw,96px);
  flex-wrap:wrap;
}
.svc-header-left{}
.svc-eyebrow{
  display:inline-flex;align-items:center;gap:10px;
  font-size:.575rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
  color:var(--text-3);margin-bottom:20px;
}
.eyebrow-bar{
  width:24px;height:1px;
  background:linear-gradient(90deg,rgba(99,102,241,.6),transparent);
}
.svc-title{
  font-size:clamp(2.2rem,4vw,3.6rem);
  font-weight:900;letter-spacing:-.04em;line-height:1.0;
  color:var(--text-1);
}
.svc-title .g{
  background:var(--grad);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.svc-header-right{
  max-width:380px;
}
.svc-subtitle{
  font-size:clamp(.875rem,1.1vw,1rem);
  color:var(--text-2);line-height:1.72;font-weight:400;
}
.svc-count{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:16px;
  font-size:.5625rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-4);
}
.svc-count-num{
  font-size:.75rem;font-weight:800;letter-spacing:-.01em;
  background:var(--grad);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ══════════════════════════════
   GRID
══════════════════════════════ */
.svc-grid{
  position:relative;z-index:2;
  max-width:1200px;margin:0 auto;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:clamp(14px,1.8vw,22px);
}

/* ══════════════════════════════
   CARD
══════════════════════════════ */
.svc-card{
  position:relative;
  border-radius:20px;
  padding:clamp(28px,3vw,40px);
  background:var(--elevated);
  border:1px solid var(--border-s);
  cursor:default;
  overflow:hidden;
  transform-style:preserve-3d;
  will-change:transform;
  transition:border-color .4s ease, box-shadow .4s ease;

  /* min height for breathing room */
  min-height:clamp(300px,32vw,400px);
  display:flex;flex-direction:column;
  gap:0;
}

/* Noise texture for card surface depth */
.svc-card::after{
  content:'';
  position:absolute;inset:0;border-radius:inherit;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:.018;pointer-events:none;z-index:0;
}

/* Glass shimmer on top-left */
.svc-card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.07) 35%,rgba(255,255,255,.12) 50%,rgba(255,255,255,.07) 65%,transparent 100%);
  z-index:1;
  transition:opacity .4s;
}

.svc-card:hover{
  border-color:rgba(99,102,241,.25);
  box-shadow:
    0 0 0 1px rgba(99,102,241,.08),
    0 16px 60px rgba(0,0,0,.6),
    0 0 80px rgba(99,102,241,.06);
}

/* ── CARD INNER GLOW (brand color orb, per card) ── */
.card-glow{
  position:absolute;
  border-radius:50%;
  filter:blur(55px);
  pointer-events:none;
  z-index:0;
  opacity:0;
  transition:opacity .6s ease;
}
.svc-card:hover .card-glow{ opacity:1; }

/* ── SPOTLIGHT (mouse-tracking inner light) ── */
.card-spotlight{
  position:absolute;inset:0;border-radius:inherit;
  pointer-events:none;z-index:1;
  opacity:0;
  transition:opacity .3s ease;
  background:radial-gradient(circle 220px at var(--mx,50%) var(--my,50%),
    rgba(255,255,255,.04) 0%,transparent 70%);
}
.svc-card:hover .card-spotlight{ opacity:1; }

/* ── CARD NUMBER ── */
.card-num{
  position:absolute;top:28px;right:32px;
  font-size:.6rem;font-weight:700;letter-spacing:.1em;
  color:var(--text-4);z-index:2;
  transition:color .3s;
}
.svc-card:hover .card-num{ color:var(--text-3); }

/* ── ICON ── */
.card-icon-wrap{
  position:relative;z-index:2;
  width:52px;height:52px;
  margin-bottom:28px;
  flex-shrink:0;
}
.card-icon-bg{
  position:absolute;inset:0;
  border-radius:14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  transition:all .4s cubic-bezier(.16,1,.3,1);
}
.svc-card:hover .card-icon-bg{
  background:rgba(99,102,241,.1);
  border-color:rgba(99,102,241,.25);
  transform:scale(1.05) rotate(-3deg);
}
.card-icon-svg{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);
}
.svc-card:hover .card-icon-svg{ transform:scale(1.12) rotate(3deg); }
.card-icon-svg svg{ width:24px;height:24px;display:block; }

/* ── TITLE ── */
.card-title{
  position:relative;z-index:2;
  font-size:clamp(1.1rem,1.6vw,1.35rem);
  font-weight:800;letter-spacing:-.025em;line-height:1.2;
  color:var(--text-1);margin-bottom:14px;
  transition:color .3s;
}

/* Animated underline on title */
.card-title-line{
  display:block;
  height:1px;width:0;margin-top:10px;
  background:var(--grad);
  transition:width .5s cubic-bezier(.16,1,.3,1);
}
.svc-card:hover .card-title-line{ width:100%; }

/* ── DESCRIPTION ── */
.card-desc{
  position:relative;z-index:2;
  font-size:clamp(.8125rem,.95vw,.9rem);
  color:var(--text-2);line-height:1.72;font-weight:400;
  margin-bottom:auto;padding-bottom:24px;
}

/* ── CAPABILITIES LIST ── */
.card-caps{
  position:relative;z-index:2;
  display:flex;flex-wrap:wrap;gap:7px;
  padding-top:22px;
  border-top:1px solid rgba(255,255,255,.05);
  margin-top:8px;
}
.cap-tag{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 11px;border-radius:6px;
  font-size:.5625rem;font-weight:600;letter-spacing:.04em;
  color:var(--text-3);
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.055);
  transition:all .25s cubic-bezier(.16,1,.3,1);
  cursor:default;
}
.cap-tag:hover{
  color:var(--text-1);
  background:rgba(99,102,241,.1);
  border-color:rgba(99,102,241,.25);
  transform:translateY(-1px);
}
.cap-dot{
  width:4px;height:4px;border-radius:50%;
  background:currentColor;opacity:.5;flex-shrink:0;
}

/* ── CARD ARROW ── */
.card-arrow{
  position:absolute;bottom:30px;right:28px;z-index:2;
  width:34px;height:34px;border-radius:9px;
  border:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.03);
  opacity:0;transform:translate(4px,4px) scale(.85);
  transition:all .35s cubic-bezier(.16,1,.3,1);
  color:var(--text-2);
}
.svc-card:hover .card-arrow{
  opacity:1;transform:translate(0,0) scale(1);
  background:rgba(99,102,241,.12);
  border-color:rgba(99,102,241,.25);
  color:var(--text-1);
}
.card-arrow svg{ width:14px;height:14px; }

/* ── ACCENT LINE (left border glow) ── */
.card-accent{
  position:absolute;
  left:0;top:20%;bottom:20%;
  width:2px;border-radius:2px;
  background:var(--grad);
  opacity:0;
  transform:scaleY(0);transform-origin:center;
  transition:opacity .4s ease, transform .5s cubic-bezier(.16,1,.3,1);
}
.svc-card:hover .card-accent{
  opacity:.7;transform:scaleY(1);
}

/* ── FEATURED CARD (first, spans 2 cols) ── */
.svc-card.featured{
  grid-column:span 2;
  flex-direction:row;
  align-items:flex-start;
  gap:clamp(24px,4vw,56px);
  min-height:clamp(240px,24vw,320px);
}
.featured .card-body{ flex:1; }
.featured .card-visual{
  flex-shrink:0;
  width:clamp(160px,18vw,240px);
  align-self:stretch;
  border-radius:14px;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
  transition:border-color .4s;
}
.svc-card.featured:hover .card-visual{
  border-color:rgba(99,102,241,.2);
}
.visual-canvas{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}

/* ── BOTTOM CTA STRIP ── */
.svc-cta{
  position:relative;z-index:2;
  max-width:1200px;margin:clamp(40px,5vw,70px) auto 0;
  display:flex;align-items:center;justify-content:space-between;
  padding:28px 36px;
  border-radius:16px;
  border:1px solid var(--border-s);
  background:rgba(255,255,255,.02);
  gap:24px;flex-wrap:wrap;
  backdrop-filter:blur(8px);
}
.cta-text-wrap{}
.cta-label{
  font-size:.5625rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--text-3);margin-bottom:6px;
}
.cta-text{
  font-size:clamp(.9375rem,1.3vw,1.125rem);font-weight:700;letter-spacing:-.02em;
  color:var(--text-1);
}
.cta-text .g{
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.cta-btns{ display:flex;gap:12px;align-items:center;flex-shrink:0; }
.cta-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:11px 24px;border-radius:10px;
  font-family:inherit;font-size:.8125rem;font-weight:600;letter-spacing:-.005em;
  cursor:pointer;transition:all .28s cubic-bezier(.16,1,.3,1);border:none;
  position:relative;overflow:hidden;
}
.cta-btn::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.07),transparent);
  opacity:0;transition:opacity .2s}
.cta-btn:hover::after{opacity:1}
.cta-btn:hover{transform:translateY(-1px)}
.cta-btn-primary{
  background:var(--grad);color:#fff;
  box-shadow:0 4px 20px rgba(99,102,241,.3),0 0 0 1px rgba(99,102,241,.2);
}
.cta-btn-primary:hover{box-shadow:0 8px 32px rgba(99,102,241,.45),0 0 0 1px rgba(99,102,241,.35)}
.cta-btn-ghost{
  background:transparent;color:var(--text-2);
  border:1px solid var(--border-s);
}
.cta-btn-ghost:hover{color:var(--text-1);border-color:rgba(99,102,241,.3);background:rgba(99,102,241,.06)}
.btn-arr{transition:transform .25s cubic-bezier(.34,1.56,.64,1);display:inline-block}
.cta-btn:hover .btn-arr{transform:translateX(3px)}

/* ── RESPONSIVE ── */
@media(max-width:1024px){
  .svc-grid{grid-template-columns:repeat(2,1fr)}
  .svc-card.featured{grid-column:span 2}
  .featured .card-visual{display:none}
}
@media(max-width:640px){
  .svc-grid{grid-template-columns:1fr}
  .svc-card.featured{grid-column:span 1;flex-direction:column}
  .svc-header{flex-direction:column;align-items:flex-start;gap:20px}
  .svc-cta{flex-direction:column;align-items:flex-start}
  .cta-btns{width:100%}
  .cta-btn{flex:1;justify-content:center}
}

/* ── ENTRANCE ── */
.svc-card{opacity:0;transform:translateY(28px)}
.svc-header{opacity:0;transform:translateY(20px)}
.svc-cta{opacity:0;transform:translateY(16px)}
/* ── LEARN MORE BUTTON ── */
.card-learn{
  position:relative;z-index:2;
  display:inline-flex;align-items:center;gap:6px;
  margin-top:20px;
  font-family:inherit;font-size:.6875rem;font-weight:600;letter-spacing:.02em;
  color:var(--text-3);background:transparent;border:none;cursor:pointer;
  padding:0;transition:color .25s cubic-bezier(.16,1,.3,1);
}
.card-learn::after{
  content:'';display:block;height:1px;
  width:0;background:var(--grad);
  position:absolute;bottom:-2px;left:0;
  transition:width .35s cubic-bezier(.16,1,.3,1);
}
.svc-card:hover .card-learn{color:var(--text-2);}
.card-learn:hover{color:var(--text-1) !important;}
.card-learn:hover::after{width:100%;}
.card-learn-arr{
  display:inline-block;font-size:.75rem;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
}
.card-learn:hover .card-learn-arr{transform:translateX(4px);}

/* ── AMBIENT CANVAS on new cards ── */
.card-canvas-bg{
  position:absolute;inset:0;z-index:0;
  pointer-events:none;opacity:0;
  transition:opacity .5s ease;
  border-radius:inherit;overflow:hidden;
}
.svc-card:hover .card-canvas-bg{opacity:1;}
.card-canvas-bg canvas{width:100%;height:100%;display:block;}


/* ── SERVICE FILTER TABS ── */
.svc-filters{
  position:relative;z-index:2;
  max-width:1200px;margin:0 auto clamp(36px,4vw,56px);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.svc-filter-btn{
  font-family:inherit;font-size:.5625rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  padding:7px 16px;border-radius:7px;cursor:pointer;
  border:1px solid rgba(255,255,255,.07);
  background:transparent;color:var(--text-3);
  transition:all .25s cubic-bezier(.16,1,.3,1);
}
.svc-filter-btn:hover{color:var(--text-2);border-color:rgba(99,102,241,.25);background:rgba(99,102,241,.06)}
.svc-filter-btn.active{
  background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(139,92,246,.15));
  border-color:rgba(99,102,241,.35);color:var(--text-1);
}
.svc-card.hidden{opacity:0!important;transform:scale(.95)!important;pointer-events:none}
.svc-card{transition:opacity .35s ease,transform .35s ease,border-color .4s ease,box-shadow .4s ease}

/* ── QUOTE CTA on cards ── */
.card-quote-cta{
  position:relative;z-index:2;
  display:inline-flex;align-items:center;gap:6px;
  margin-top:16px;
  font-family:inherit;font-size:.5625rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:7px 14px;border-radius:7px;cursor:pointer;border:none;
  background:rgba(99,102,241,.1);color:var(--indigo);
  border:1px solid rgba(99,102,241,.2);
  transition:all .25s cubic-bezier(.16,1,.3,1);
}
.card-quote-cta:hover{background:rgba(99,102,241,.18);border-color:rgba(99,102,241,.4);transform:translateY(-1px)}
.cqc-arr{display:inline-block;transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.card-quote-cta:hover .cqc-arr{transform:translateX(3px)}
</style>
</head>
<body>

<section id="services">
  <div class="svc-bg"></div>
  <div class="svc-grid-bg"></div>

  <!-- Header -->
  <div class="svc-header" id="svc-header">
    <div class="svc-header-left">
      <div class="svc-eyebrow">
        <div class="eyebrow-bar"></div>
        What We Build
      </div>
      <h2 class="svc-title">Services that<br/><span class="g">drive results</span></h2>
    </div>
    <div class="svc-header-right">
      <p class="svc-subtitle">Every engagement is built around your goals — from the first pixel to the last deployment. No templates. No shortcuts. Just exceptional craft.</p>
      <div class="svc-count">
        <span class="svc-count-num">14</span> core services &nbsp;·&nbsp;
        <span class="svc-count-num">01</span> team
      </div>
    </div>
  </div>


  <!-- Service Filter Tabs -->
  <div class="svc-filters" id="svc-filters">
    <button class="svc-filter-btn active" data-filter="all">All Services</button>
    <button class="svc-filter-btn" data-filter="design">Design</button>
    <button class="svc-filter-btn" data-filter="development">Development</button>
    <button class="svc-filter-btn" data-filter="marketing">Marketing</button>
    <button class="svc-filter-btn" data-filter="growth">Growth</button>
    <button class="svc-filter-btn" data-filter="strategy">Strategy</button>
  </div>

  <!-- Grid -->
  <div class="svc-grid" id="svc-grid">
    <!-- Cards injected by JS -->
  </div>

  <!-- CTA Strip -->
  <div class="svc-cta" id="svc-cta">
    <div class="cta-text-wrap">
      <div class="cta-label">Ready to begin?</div>
      <div class="cta-text">Let's build something <span class="g">exceptional</span> together.</div>
    </div>
    <div class="cta-btns">
      <button class="cta-btn cta-btn-primary">Get a Free Proposal <span class="btn-arr">→</span></button>
      <button class="cta-btn cta-btn-ghost">View Our Work</button>
    </div>
  </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
// ── SERVICE FILTER ──
(function(){
  const filterBtns = document.querySelectorAll('.svc-filter-btn');
  const cards = document.querySelectorAll('.svc-card');

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filter = btn.dataset.filter;
      cards.forEach(card => {
        if(filter === 'all' || card.dataset.cat === filter){
          card.classList.remove('hidden');
        } else {
          card.classList.add('hidden');
        }
      });
    });
  });

  // Quote CTA hover — magnetic
  document.querySelectorAll('.card-quote-cta').forEach(btn => {
    btn.addEventListener('mousemove', e => {
      const r = btn.getBoundingClientRect();
      const dx = (e.clientX-(r.left+r.width/2))*.3;
      const dy = (e.clientY-(r.top+r.height/2))*.3;
      btn.style.transform = 'translate('+dx+'px,'+dy+'px)';
    });
    btn.addEventListener('mouseleave', () => { btn.style.transform = ''; });
  });
})();

</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js"></script>
<script>
const {gsap} = window;
CustomEase.create("expo","0.16,1,0.3,1");
CustomEase.create("spring","0.34,1.56,0.64,1");

// ─────────────────────────────────────────────
//  SERVICE DATA
// ─────────────────────────────────────────────
const SERVICES = [
  {
    id:'web-design',cat:'design',
    num:'01',

function buildCard(svc, idx) {
  const isFeatured = svc.featured; const cat = svc.cat || 'design';

  const capsHTML = svc.caps.map(c =>
    `<span class="cap-tag"><span class="cap-dot"></span>${c}</span>`
  ).join('');

  const visualHTML = isFeatured ? `
    <div class="card-visual" id="visual-${svc.id}">
      <div class="visual-canvas" id="vc-${svc.id}">
        <canvas id="canvas-${svc.id}" width="220" height="260"></canvas>
      </div>
    </div>` : '';

  const bodyContent = `
    <div class="${isFeatured ? 'card-body' : ''}">
      <div class="card-icon-wrap">
        <div class="card-icon-bg"></div>
        <div class="card-icon-svg">${svc.icon}</div>
      </div>
      <div class="card-title">${svc.title}<span class="card-title-line"></span></div>
      <div class="card-desc">${svc.desc}</div>
      <div class="card-caps">${capsHTML}</div>
      ${svc.learnMore ? `<button class="card-learn">Explore service <span class="card-learn-arr">→</span></button>` : ''}
      ${!isFeatured ? `<button class="card-quote-cta">Get a Quote <span class="cqc-arr">→</span></button>` : ''}
    </div>`;

  const ambientCanvas = svc.learnMore ? `
    <div class="card-canvas-bg" id="cbg-${svc.id}">
      <canvas id="ccanvas-${svc.id}"></canvas>
    </div>` : '';

  return `
    <div class="svc-card${isFeatured ? ' featured' : ''}" data-idx="${idx}" data-cat="${cat}" id="card-${svc.id}">
      ${svc.learnMore ? ambientCanvas : ''}
      <div class="card-glow" style="
        width:${svc.glowSize.w};height:${svc.glowSize.h};
        top:${svc.glowPos.y};left:${svc.glowPos.x};
        background:radial-gradient(circle,${svc.glowColor},transparent 70%);
        transform:translate(-50%,-50%);
      "></div>
      <div class="card-spotlight"></div>
      <div class="card-accent"></div>
      <div class="card-num">${svc.num}</div>
      ${isFeatured ? `${bodyContent}${visualHTML}` : bodyContent}
      <div class="card-arrow">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2.5 11.5l9-9M5 2.5h6.5v6.5"/>
        </svg>
      </div>
    </div>`;
}

// ─────────────────────────────────────────────
//  LIVE CANVAS — Web Dev featured card
// ─────────────────────────────────────────────
(function initDevCanvas() {
  const canvas = document.getElementById('canvas-web-dev');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const lines = [
    { y:0.15, text:'export async function build() {', indent:0, col:'#6366F1' },
    { y:0.25, text:'  const stack = await', indent:1, col:'#5A5A78' },
    { y:0.34, text:'    raivonah.init(config)', indent:2, col:'#3B82F6' },
    { y:0.44, text:'  return stack.deploy()', indent:1, col:'#8B5CF6' },
    { y:0.54, text:'}', indent:0, col:'#5A5A78' },
    { y:0.68, text:'// ✓ Build successful', indent:0, col:'#22c55e' },
    { y:0.78, text:'// ✓ Deployed to edge', indent:0, col:'#22c55e' },
  ];

  let cursor = 0;
  let charIdx = 0;
  let lineRendered = [];

  function drawFrame() {
    ctx.clearRect(0,0,W,H);

    // BG
    ctx.fillStyle = 'rgba(10,10,18,0)';
    ctx.fillRect(0,0,W,H);

    // Line numbers gutter
    for (let i = 0; i < lines.length; i++) {
      ctx.fillStyle = 'rgba(90,90,120,0.3)';
      ctx.font = '11px "Courier New", monospace';
      ctx.fillText(String(i+1).padStart(2,' '), 12, lines[i].y * H);
    }

    // Rendered lines
    for (let i = 0; i < lineRendered.length; i++) {
      const ln = lines[i];
      const txt = i < cursor ? ln.text : ln.text.slice(0, charIdx);
      ctx.fillStyle = ln.col;
      ctx.font = '10.5px "Courier New", monospace';
      ctx.fillText(txt, 34, ln.y * H);
    }

    // Cursor blink
    if (cursor < lines.length) {
      const ln = lines[cursor];
      const rendered = ln.text.slice(0, charIdx);
      const cw = ctx.measureText(rendered).width;
      const blinkOn = Math.floor(Date.now() / 450) % 2 === 0;
      if (blinkOn) {
        ctx.fillStyle = '#6366F1';
        ctx.fillRect(34 + cw, ln.y * H - 11, 1.5, 13);
      }
    }

    // Typewriter tick
    if (cursor < lines.length) {
      if (!lineRendered[cursor]) lineRendered[cursor] = true;
      charIdx++;
      if (charIdx > lines[cursor].text.length + 8) {
        cursor++;
        charIdx = 0;
        if (cursor >= lines.length) {
          setTimeout(() => {
            cursor = 0; charIdx = 0; lineRendered = [];
          }, 2200);
        }
      }
    }

    requestAnimationFrame(drawFrame);
  }
  drawFrame();
})();

// ─────────────────────────────────────────────
//  3D TILT + MAGNETIC + SPOTLIGHT
// ─────────────────────────────────────────────
const TILT_MAX = 10;
const MAG_STRENGTH = 0.25;

document.querySelectorAll('.svc-card').forEach(card => {
  const spotlight = card.querySelector('.card-spotlight');
  let animFrame;

  // Smooth tilt state
  let targetRX = 0, targetRY = 0;
  let currentRX = 0, currentRY = 0;
  let isHovered = false;

  function animateTilt() {
    const ease = isHovered ? 0.1 : 0.07;
    currentRX += (targetRX - currentRX) * ease;
    currentRY += (targetRY - currentRY) * ease;

    const dist = Math.sqrt(currentRX * currentRX + currentRY * currentRY);
    if (dist < 0.01 && !isHovered) {
      cancelAnimationFrame(animFrame);
      card.style.transform = '';
      return;
    }

    card.style.transform =
      `perspective(900px) rotateX(${currentRX}deg) rotateY(${currentRY}deg) translateZ(${isHovered ? 8 : 0}px)`;
    animFrame = requestAnimationFrame(animateTilt);
  }

  card.addEventListener('mouseenter', () => {
    isHovered = true;
    cancelAnimationFrame(animFrame);
    animFrame = requestAnimationFrame(animateTilt);
  });

  card.addEventListener('mousemove', e => {
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    const nx = dx / (rect.width / 2);
    const ny = dy / (rect.height / 2);

    targetRY =  nx * TILT_MAX;
    targetRX = -ny * TILT_MAX;

    // Spotlight follows mouse
    if (spotlight) {
      const mx = ((e.clientX - rect.left) / rect.width) * 100;
      const my = ((e.clientY - rect.top) / rect.height) * 100;
      card.style.setProperty('--mx', mx + '%');
      card.style.setProperty('--my', my + '%');
      spotlight.style.background = `radial-gradient(circle 240px at ${mx}% ${my}%,rgba(255,255,255,.045) 0%,transparent 70%)`;
    }
  });

  card.addEventListener('mouseleave', () => {
    isHovered = false;
    targetRX = 0;
    targetRY = 0;
    if (spotlight) spotlight.style.background = '';
    cancelAnimationFrame(animFrame);
    animFrame = requestAnimationFrame(animateTilt);
  });
});

// ─────────────────────────────────────────────
//  MAGNETIC BUTTON EFFECT on CTA
// ─────────────────────────────────────────────
document.querySelectorAll('.cta-btn, .card-arrow').forEach(btn => {
  btn.addEventListener('mousemove', e => {
    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = (e.clientX - cx) * MAG_STRENGTH;
    const dy = (e.clientY - cy) * MAG_STRENGTH;
    btn.style.transform = `translate(${dx}px,${dy}px)`;
  });
  btn.addEventListener('mouseleave', () => {
    btn.style.transform = '';
  });
});

// ─────────────────────────────────────────────
//  ENTRANCE ANIMATION
// ─────────────────────────────────────────────
(function initEntrance() {
  const header = document.getElementById('svc-header');
  const cards  = document.querySelectorAll('.svc-card');
  const cta    = document.getElementById('svc-cta');

  const obs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      obs.unobserve(entry.target);

      if (entry.target === header) {
        gsap.to(header, { opacity:1, y:0, duration:.7, ease:'expo' });
      }
      if (entry.target === cta) {
        gsap.to(cta, { opacity:1, y:0, duration:.6, ease:'expo', delay:.1 });
      }
    });
  }, { threshold: 0.15 });

  // Cards get their own observer with stagger
  const cardObs = new IntersectionObserver(entries => {
    const visible = entries.filter(e => e.isIntersecting);
    if (!visible.length) return;

    // Gather all visible cards and stagger them
    visible.forEach((entry, i) => {
      const idx = parseInt(entry.target.dataset.idx) || i;
      gsap.to(entry.target, {
        opacity:1, y:0,
        duration:.7,
        delay: (idx % 3) * 0.08 + Math.floor(idx / 3) * 0.04,
        ease:'expo',
      });
      cardObs.unobserve(entry.target);
    });
  }, { threshold: 0.08, rootMargin:'0px 0px -40px 0px' });

  obs.observe(header);
  obs.observe(cta);
  cards.forEach(c => cardObs.observe(c));
})();

// ─────────────────────────────────────────────
//  CAP TAG STAGGER on card hover
// ─────────────────────────────────────────────
document.querySelectorAll('.svc-card').forEach(card => {
  const tags = card.querySelectorAll('.cap-tag');

  card.addEventListener('mouseenter', () => {
    tags.forEach((t, i) => {
      clearTimeout(t._to);
      t._to = setTimeout(() => {
        t.style.transition = `all .22s cubic-bezier(.16,1,.3,1) ${i*28}ms`;
        t.style.borderColor = 'rgba(99,102,241,.2)';
        t.style.color = 'rgba(160,160,184,0.9)';
      }, i * 18);
    });
  });

  card.addEventListener('mouseleave', () => {
    tags.forEach(t => {
      clearTimeout(t._to);
      t.style.transition = 'all .3s ease';
      t.style.borderColor = '';
      t.style.color = '';
    });
  });
});

// ─────────────────────────────────────────────
//  AMBIENT CANVAS — new service cards
// ─────────────────────────────────────────────
(function initAmbientCanvases() {
  const newServices = SERVICES.filter(s => s.learnMore);

  newServices.forEach(svc => {
    const wrap   = document.getElementById('cbg-'     + svc.id);
    const canvas = document.getElementById('ccanvas-' + svc.id);
    if (!wrap || !canvas) return;

    const m  = svc.glowColor.match(/rgba?\((\d+),(\d+),(\d+)/);
    const cr = m ? parseInt(m[1]) : 99;
    const cg = m ? parseInt(m[2]) : 102;
    const cb = m ? parseInt(m[3]) : 241;

    function resize() {
      const par = wrap.parentElement;
      canvas.width  = Math.max(par ? par.offsetWidth  : 340, 100);
      canvas.height = Math.max(par ? par.offsetHeight : 380, 100);
    }
    resize();
    window.addEventListener('resize', resize);

    const ctx = canvas.getContext('2d');
    const pts = Array.from({length:12}, () => ({
      x:Math.random(), y:Math.random(),
      vx:(Math.random()-.5)*.0006, vy:(Math.random()-.5)*.0005,
      r:.5+Math.random()*1.8, a:.08+Math.random()*.22,
    }));

    let running = false, raf;

    function tick() {
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0,0,W,H);

      const glowR = Math.max(W*.7, 1);
      const grd = ctx.createRadialGradient(W*.15,H*.15,0,W*.15,H*.15,glowR);
      grd.addColorStop(0,'rgba('+cr+','+cg+','+cb+',.06)');
      grd.addColorStop(1,'transparent');
      ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);

      for (const p of pts) {
        p.x += p.vx; p.y += p.vy;
        if (p.x<0||p.x>1) p.vx*=-1;
        if (p.y<0||p.y>1) p.vy*=-1;
      }

      for (let i=0; i<pts.length; i++) {
        for (let j=i+1; j<pts.length; j++) {
          const a=pts[i], b=pts[j];
          const dx=(b.x-a.x)*W, dy=(b.y-a.y)*H;
          const d=Math.sqrt(dx*dx+dy*dy);
          if (d>120) continue;
          ctx.strokeStyle='rgba('+cr+','+cg+','+cb+','+(((1-d/120)*.09))+')';
          ctx.lineWidth=.6;
          ctx.beginPath(); ctx.moveTo(a.x*W,a.y*H); ctx.lineTo(b.x*W,b.y*H); ctx.stroke();
        }
      }

      for (const p of pts) {
        ctx.save();
        ctx.fillStyle='rgba('+cr+','+cg+','+cb+','+p.a+')';
        ctx.shadowBlur=p.r*5; ctx.shadowColor='rgba('+cr+','+cg+','+cb+',.5)';
        ctx.beginPath(); ctx.arc(Math.max(p.x*W,0),Math.max(p.y*H,0),Math.max(p.r,.1),0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
      raf = requestAnimationFrame(tick);
    }

    const card = document.getElementById('card-'+svc.id);
    if (card) {
      card.addEventListener('mouseenter', () => { if (!running){running=true;tick();} });
      card.addEventListener('mouseleave', () => {
        running=false; cancelAnimationFrame(raf);
        ctx.clearRect(0,0,canvas.width,canvas.height);
      });
    }
  });
})();

// ─────────────────────────────────────────────
//  INTERACTIONS — new cards (tilt + spotlight
//  + magnetic arrow + cap tag stagger)
// ─────────────────────────────────────────────
(function attachNewCardInteractions() {
  const newCards = SERVICES
    .filter(s => s.learnMore)
    .map(s => document.getElementById('card-'+s.id))
    .filter(Boolean);

  newCards.forEach(card => {
    const spotlight = card.querySelector('.card-spotlight');
    let raf, targetRX=0, targetRY=0, curRX=0, curRY=0, hovered=false;

    function animTilt() {
      curRX += (targetRX - curRX) * (hovered?.1:.07);
      curRY += (targetRY - curRY) * (hovered?.1:.07);
      if (Math.sqrt(curRX*curRX+curRY*curRY)<.01 && !hovered) {
        cancelAnimationFrame(raf); card.style.transform=''; return;
      }
      card.style.transform =
        'perspective(900px) rotateX('+curRX+'deg) rotateY('+curRY+'deg) translateZ('+(hovered?8:0)+'px)';
      raf = requestAnimationFrame(animTilt);
    }

    card.addEventListener('mouseenter', () => {
      hovered=true; cancelAnimationFrame(raf); raf=requestAnimationFrame(animTilt);
    });
    card.addEventListener('mousemove', e => {
      const r=card.getBoundingClientRect();
      targetRY =  ((e.clientX-r.left-r.width /2)/(r.width /2))*10;
      targetRX = -((e.clientY-r.top -r.height/2)/(r.height/2))*10;
      if (spotlight) {
        const mx=((e.clientX-r.left)/r.width )*100;
        const my=((e.clientY-r.top )/r.height)*100;
        spotlight.style.background=
          'radial-gradient(circle 240px at '+mx+'% '+my+'%,rgba(255,255,255,.045) 0%,transparent 70%)';
      }
    });
    card.addEventListener('mouseleave', () => {
      hovered=false; targetRX=0; targetRY=0;
      if(spotlight) spotlight.style.background='';
      cancelAnimationFrame(raf); raf=requestAnimationFrame(animTilt);
    });

    // Magnetic arrow
    const arrow = card.querySelector('.card-arrow');
    if (arrow) {
      arrow.addEventListener('mousemove', e => {
        const r=arrow.getBoundingClientRect();
        const dx=(e.clientX-(r.left+r.width /2))*.25;
        const dy=(e.clientY-(r.top +r.height/2))*.25;
        arrow.style.transform='translate('+dx+'px,'+dy+'px)';
      });
      arrow.addEventListener('mouseleave', () => { arrow.style.transform=''; });
    }

    // Magnetic learn more
    const learnBtn = card.querySelector('.card-learn');
    if (learnBtn) {
      learnBtn.addEventListener('mousemove', e => {
        const r=learnBtn.getBoundingClientRect();
        const dx=(e.clientX-(r.left+r.width /2))*.3;
        const dy=(e.clientY-(r.top +r.height/2))*.3;
        learnBtn.style.transform='translate('+dx+'px,'+dy+'px)';
      });
      learnBtn.addEventListener('mouseleave', () => { learnBtn.style.transform=''; });
    }

    // Cap tag stagger
    const tags = card.querySelectorAll('.cap-tag');
    card.addEventListener('mouseenter', () => {
      tags.forEach((t,i) => {
        clearTimeout(t._nto);
        t._nto = setTimeout(() => {
          t.style.transition='all .22s cubic-bezier(.16,1,.3,1) '+(i*28)+'ms';
          t.style.borderColor='rgba(99,102,241,.2)';
          t.style.color='rgba(160,160,184,.9)';
        }, i*18);
      });
    });
    card.addEventListener('mouseleave', () => {
      tags.forEach(t => {
        clearTimeout(t._nto);
        t.style.transition='all .3s ease';
        t.style.borderColor=''; t.style.color='';
      });
    });
  });
})();

// ─────────────────────────────────────────────
//  SCROLL REVEAL — new cards
// ─────────────────────────────────────────────
(function revealNewCards() {
  const newCards = SERVICES
    .filter(s => s.learnMore)
    .map(s => document.getElementById('card-'+s.id))
    .filter(Boolean);

  const obs = new IntersectionObserver(entries => {
    entries.filter(e => e.isIntersecting).forEach(entry => {
      const idx = parseInt(entry.target.dataset.idx) || 0;
      gsap.to(entry.target, {
        opacity:1, y:0, duration:.7,
        delay: (idx % 3) * .08 + Math.floor(idx/3) * .04,
        ease:'expo',
      });
      obs.unobserve(entry.target);
    });
  }, {threshold:.08, rootMargin:'0px 0px -40px 0px'});

  newCards.forEach(c => obs.observe(c));
})();
</script>
