<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Raivonah — The Process</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#3B82F6;--indigo:#6366F1;--violet:#8B5CF6;
  --deep:#050508;--panel:#0B0B12;--text-1:#F8F8FF;--text-2:#9090A8;--text-3:#4A4A62;
  --border-s:rgba(255,255,255,.07);--border-d:rgba(255,255,255,.13);
  --grad:linear-gradient(135deg,#3B82F6 0%,#6366F1 45%,#8B5CF6 100%);
  --stage-c:#3B82F6;
}
html,body{background:var(--deep);min-height:100%}
body{color:var(--text-1);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

#process{position:relative;background:var(--deep);padding:clamp(80px,9vw,130px) 24px clamp(90px,10vw,150px);overflow:hidden}

/* ── Ambient backdrop: soft orbs + dot grid, consistent with site's hero language ── */
.proc-bg{position:absolute;inset:0;z-index:0;pointer-events:none}
.proc-orb{position:absolute;border-radius:50%;filter:blur(70px);mix-blend-mode:screen;transition:background 1.2s ease}
#proc-orb-1{width:480px;height:480px;top:-140px;left:-120px;background:radial-gradient(circle,rgba(59,130,246,.16),transparent 70%)}
#proc-orb-2{width:420px;height:420px;bottom:-160px;right:-100px;background:radial-gradient(circle,rgba(139,92,246,.14),transparent 70%)}
.proc-grid{position:absolute;inset:0;opacity:.35}

/* ── INTRO ── */
.process-intro{position:relative;z-index:2;max-width:780px;margin:0 auto;text-align:center}
.pi-eyebrow{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:22px;
  font-size:12px;letter-spacing:.22em;font-weight:600;color:var(--text-3);text-transform:uppercase}
.pi-line{width:32px;height:1px;background:var(--border-d)}
.pi-title{font-size:clamp(32px,6vw,58px);font-weight:800;line-height:1.08;letter-spacing:-.02em}
.pi-title .g{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.pi-sub{margin-top:22px;font-size:17px;line-height:1.6;color:var(--text-2)}

/* ── WORKFLOW STRIP: numbered nodes + connecting line ── */
.workflow{position:relative;z-index:2;max-width:1180px;margin:64px auto 0;display:flex;align-items:flex-start;gap:0}
.wf-node{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;cursor:pointer;
  padding:0 6px;background:none;border:none;color:inherit;font:inherit}
.wf-dot{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:15px;background:var(--panel);border:1.5px solid var(--border-d);color:var(--text-3);
  transition:.35s cubic-bezier(.16,1,.3,1);position:relative;z-index:2;flex-shrink:0}
.wf-node.active .wf-dot{background:var(--stage-c);border-color:var(--stage-c);color:#fff;
  transform:scale(1.14);box-shadow:0 0 0 7px color-mix(in srgb, var(--stage-c) 16%, transparent),0 8px 24px -6px var(--stage-c)}
.wf-node.done .wf-dot{background:rgba(255,255,255,.06);border-color:var(--border-d);color:var(--text-2)}
.wf-line{position:absolute;top:23px;left:calc(-50% + 23px);width:calc(100% - 46px);height:1.5px;
  background:var(--border-s);z-index:1;overflow:hidden}
.wf-line::after{content:'';position:absolute;inset:0;background:var(--stage-c);transform:scaleX(0);
  transform-origin:left;transition:transform .5s cubic-bezier(.16,1,.3,1)}
.wf-line.done::after{transform:scaleX(1)}
.wf-node:first-child .wf-line{display:none}
.wf-label{margin-top:12px;font-size:12.5px;font-weight:600;color:var(--text-3);text-align:center;transition:.3s}
.wf-node.active .wf-label{color:var(--text-1)}
@media(max-width:760px){.wf-label{display:none}.wf-dot{width:38px;height:38px;font-size:13px}.wf-line{top:19px}}

/* ── MAIN STAGE: detail panel + 3D orbital carousel ── */
.stage-stage{position:relative;z-index:2;max-width:1180px;margin:60px auto 0;display:grid;
  grid-template-columns:1.05fr .95fr;gap:56px;align-items:center}
@media(max-width:880px){.stage-stage{grid-template-columns:1fr;gap:8px;text-align:center}}

.stage-panel{display:none}
.stage-panel.active{display:block;animation:panelIn .55s cubic-bezier(.16,1,.3,1)}
@keyframes panelIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.stage-num{font-size:13px;font-weight:700;letter-spacing:.1em;color:var(--text-3);margin-bottom:14px}
.stage-eyebrow{display:flex;align-items:center;gap:10px;font-size:12px;letter-spacing:.16em;font-weight:600;
  text-transform:uppercase;color:var(--text-2);margin-bottom:18px}
@media(max-width:880px){.stage-eyebrow{justify-content:center}}
.stage-eyebrow-dot{width:6px;height:6px;border-radius:50%;background:var(--stage-c)}
.stage-title{font-size:clamp(28px,4vw,44px);font-weight:800;line-height:1.1;letter-spacing:-.02em;margin-bottom:18px}
.stage-title .g{color:var(--stage-c)}
.stage-desc{font-size:16px;line-height:1.7;color:var(--text-2);max-width:46ch}
@media(max-width:880px){.stage-desc{margin-inline:auto}}
.stage-details{display:flex;flex-wrap:wrap;gap:8px;margin-top:24px}
@media(max-width:880px){.stage-details{justify-content:center}}
.stage-detail{font-size:12.5px;padding:7px 12px;border-radius:99px;border:1px solid var(--border-s);
  background:rgba(255,255,255,.025);color:var(--text-2)}
.stage-duration{margin-top:26px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-3);font-weight:600}
@media(max-width:880px){.stage-duration{justify-content:center}}
.stage-duration-bar{width:18px;height:2px;background:var(--stage-c)}

.stage-nav{display:flex;gap:10px;margin-top:32px}
@media(max-width:880px){.stage-nav{justify-content:center;margin-top:20px}}
.sn-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border-d);background:transparent;
  color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.25s}
.sn-btn:hover{border-color:var(--stage-c);color:var(--text-1)}
.sn-btn:disabled{opacity:.3;cursor:default}
.sn-btn:disabled:hover{border-color:var(--border-d);color:var(--text-2)}

/* ── Signature element: real CSS 3D orbital ring carousel ── */
.orbit-stage{perspective:1400px;perspective-origin:50% 45%;position:relative;
  display:flex;align-items:center;justify-content:center;height:380px}
@media(max-width:880px){.orbit-stage{height:300px}}
.orbit-ring{position:relative;width:1px;height:1px;transform-style:preserve-3d;
  transition:transform 1s cubic-bezier(.65,0,.35,1);
  animation:ringDrift 14s linear infinite}
@keyframes ringDrift{from{rotate:y 0deg}to{rotate:y 360deg}}
.orbit-ring.paused{animation-play-state:paused}

.orbit-card{position:absolute;top:50%;left:50%;width:158px;height:158px;margin:-79px 0 0 -79px;
  border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;
  border:1px solid rgba(255,255,255,.1);
  background:linear-gradient(160deg, color-mix(in srgb, var(--face-c) 20%, #0B0B12) 0%, #08080d 100%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 24px 50px -18px color-mix(in srgb, var(--face-c) 40%, transparent);
  transition:opacity .6s ease, filter .6s ease;
  backface-visibility:hidden}
.orbit-card.is-active{border-color:color-mix(in srgb, var(--face-c) 55%, transparent)}
.oc-num{font-size:12px;font-weight:800;letter-spacing:.06em;color:color-mix(in srgb, var(--face-c) 78%, white)}
.oc-icon{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;
  background:color-mix(in srgb, var(--face-c) 16%, transparent);border:1px solid color-mix(in srgb, var(--face-c) 35%, transparent)}
.oc-icon svg{width:24px;height:24px;stroke:color-mix(in srgb, var(--face-c) 85%, white)}
.oc-label{font-size:13px;font-weight:700;color:#fff;letter-spacing:.01em}

.orbit-hub{position:absolute;top:50%;left:50%;width:64px;height:64px;margin:-32px 0 0 -32px;
  border-radius:50%;z-index:1;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle, color-mix(in srgb, var(--stage-c) 30%, transparent) 0%, transparent 72%)}
.orbit-hub::before{content:'';position:absolute;inset:0;border-radius:50%;
  border:1px dashed color-mix(in srgb, var(--stage-c) 30%, transparent);animation:hubSpin 22s linear infinite}
@keyframes hubSpin{to{transform:rotate(360deg)}}
.orbit-ground{position:absolute;bottom:2px;width:220px;height:36px;border-radius:50%;filter:blur(20px);
  background:radial-gradient(ellipse, color-mix(in srgb, var(--stage-c) 42%, transparent) 0%, transparent 70%);
  transition:background .6s}

/* ── OUTRO ── */
.process-outro{position:relative;z-index:2;max-width:680px;margin:120px auto 0;padding:0 24px;text-align:center}
.outro-line{font-size:clamp(22px,3vw,30px);font-weight:600;line-height:1.45;letter-spacing:-.01em}
.outro-btns{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:34px}
.o-btn{font-size:14.5px;font-weight:600;padding:14px 26px;border-radius:99px;cursor:pointer;border:none;
  display:inline-flex;align-items:center;gap:8px;transition:.25s;font-family:inherit}
.o-btn-p{background:var(--grad);color:#fff;box-shadow:0 4px 22px rgba(99,102,241,.3)}
.o-btn-p:hover{box-shadow:0 8px 36px rgba(99,102,241,.48);transform:translateY(-2px)}
.o-btn-g{background:rgba(255,255,255,.04);color:var(--text-2);border:1px solid var(--border-s)}
.o-btn-g:hover{color:var(--text-1);border-color:rgba(99,102,241,.3);transform:translateY(-1px)}
.o-btn:hover .ob-arr{transform:translateX(4px)}
.ob-arr{transition:transform .25s}

/* Failsafe: even if JS never runs, nothing here should read as "broken" */
noscript{display:block;text-align:center;padding:60px 24px;color:var(--text-2)}
</style>
</head>
<body>

<section id="process">
  <div class="proc-bg">
    <div class="proc-orb" id="proc-orb-1"></div>
    <div class="proc-orb" id="proc-orb-2"></div>
    <svg class="proc-grid" id="proc-grid-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div class="process-intro">
    <div class="pi-eyebrow"><div class="pi-line"></div>How We Work<div class="pi-line"></div></div>
    <h2 class="pi-title">The journey from<br/><span class="g">idea to impact</span></h2>
    <p class="pi-sub">Six carefully orchestrated stages. Every step intentional. Every decision purposeful. This is how exceptional products are made.</p>
  </div>

  <nav class="workflow" id="workflow" aria-label="Process workflow"></nav>

  <div class="stage-stage">
    <div>
      <div class="stage-content" id="stage-content"></div>
      <div class="stage-nav">
        <button class="sn-btn" id="sn-prev" aria-label="Previous stage">←</button>
        <button class="sn-btn" id="sn-next" aria-label="Next stage">→</button>
      </div>
    </div>
    <div class="orbit-stage">
      <div class="orbit-ground" id="orbit-ground"></div>
      <div class="orbit-ring" id="orbit-ring">
        <div class="orbit-hub"></div>
      </div>
    </div>
  </div>

  <div class="process-outro">
    <p class="outro-line">Ready to move through the journey with a team that has done it before? Let's start your Discovery session.</p>
    <div class="outro-btns">
      <button class="o-btn o-btn-p">Book Discovery Call <span class="ob-arr">→</span></button>
      <button class="o-btn o-btn-g">View Our Work</button>
    </div>
  </div>

  <noscript>
    <p>The journey from idea to impact — Discover, Strategy, Design, Develop, Launch, Scale.</p>
  </noscript>
</section>

<script>
(function(){
"use strict";

try {

const ICONS = {
  discover:'<path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="m21 21-4.35-4.35"/>',
  strategy:'<path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/>',
  design:'<path d="M12 19l7-7 3 3-7 7-3-3Z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5Z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/>',
  develop:'<path d="m16 18 6-6-6-6"/><path d="m8 6-6 6 6 6"/>',
  launch:'<path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09Z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2Z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>',
  scale:'<path d="m3 16 5-5 4 4 8-8"/><path d="M14 7h6v6"/>',
};

const STAGES = [
  {id:'discover',num:1,label:'Discover',eyebrow:'Stage 01 · Foundation',title:['Understand','everything.'],
   desc:'Before a single pixel is drawn or line of code written, we listen. Deeply. We map your market, your users, your competitors, and your real business goals.',
   details:['User Interviews','Competitive Analysis','Market Mapping','Problem Definition','Stakeholder Alignment'],
   duration:'Week 1–2',color:'#3B82F6'},
  {id:'strategy',num:2,label:'Strategy',eyebrow:'Stage 02 · Direction',title:['Blueprint','the path.'],
   desc:'Discovery transforms into a clear strategic roadmap. Every feature, every decision grounded in evidence. We define what to build and — critically — what to leave out.',
   details:['Product Roadmap','Feature Prioritization','Technical Architecture','Go-To-Market Plan','KPI Definition'],
   duration:'Week 2–3',color:'#6366F1'},
  {id:'design',num:3,label:'Design',eyebrow:'Stage 03 · Craft',title:['Make it','beautiful.'],
   desc:'Where strategy becomes experience. We design systems, not screens — creating interfaces that guide users effortlessly from intent to outcome, with obsessive attention to craft.',
   details:['UX Architecture','Visual Design','Design System','Interactive Prototypes','Accessibility'],
   duration:'Week 3–5',color:'#8B5CF6'},
  {id:'develop',num:4,label:'Develop',eyebrow:'Stage 04 · Engineering',title:['Build without','compromise.'],
   desc:'Engineering begins with architecture. We write production-grade code from day one — performant, maintainable, scalable — deployed continuously so you see real progress every week.',
   details:['Next.js / React','TypeScript','API Development','Database Design','CI/CD Pipeline'],
   duration:'Week 5–10',color:'#A855F7'},
  {id:'launch',num:5,label:'Launch',eyebrow:'Stage 05 · Ignition',title:['Ship with','confidence.'],
   desc:'Launch day is not an accident — it is an orchestrated event. Performance audited, SEO verified, analytics instrumented, team trained. We launch hard and watch the numbers.',
   details:['Performance Audit','SEO Setup','Analytics','Launch Strategy','QA Testing'],
   duration:'Week 10–11',color:'#3B82F6'},
  {id:'scale',num:6,label:'Scale',eyebrow:'Stage 06 · Growth',title:['Grow without','limits.'],
   desc:'The product is live. Now we grow it. Data-driven iteration, growth experiments, feature expansions, and performance optimization — compounding results, month after month.',
   details:['Growth Experiments','Feature Iteration','Performance Tuning','Conversion Optimization'],
   duration:'Month 3+',color:'#6366F1'},
];

const $ = (id) => document.getElementById(id);
const workflow = $('workflow');
const stageContent = $('stage-content');
const orbitRing = $('orbit-ring');
const root = document.documentElement;
const N = STAGES.length;
const RADIUS = 230;

if (!workflow || !stageContent || !orbitRing) throw new Error('process: required elements missing');

// ── Blueprint dot-grid backdrop ──
(function buildGrid(){
  const svg = $('proc-grid-svg');
  if (!svg) return;
  const W = window.innerWidth, H = 900;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio', 'none');
  let out = '';
  for (let y = 0; y < H; y += 90) {
    for (let x = 0; x < W; x += 90) {
      if (Math.random() > 0.75) {
        out += `<circle cx="${x}" cy="${y}" r="1" fill="rgba(99,102,241,0.18)"/>`;
      }
    }
  }
  svg.innerHTML = out;
})();

// ── Build numbered workflow strip ──
STAGES.forEach((s,i)=>{
  workflow.insertAdjacentHTML('beforeend', `
    <button class="wf-node" data-idx="${i}" style="--stage-c:${s.color}">
      <div class="wf-line"></div>
      <div class="wf-dot">${s.num}</div>
      <div class="wf-label">${s.label}</div>
    </button>`);
});

// ── Build the 6 stage detail panels ──
STAGES.forEach((s,i)=>{
  const titleHTML = s.title.map((w,wi)=> wi===1 ? `<span class="g">${w}</span>` : w).join('<br/>');
  const detailsHTML = s.details.map(d=>`<span class="stage-detail">${d}</span>`).join('');
  stageContent.insertAdjacentHTML('beforeend', `
    <div class="stage-panel" id="panel-${s.id}" data-idx="${i}" style="--stage-c:${s.color}">
      <div class="stage-num">${String(s.num).padStart(2,'0')} / ${N}</div>
      <div class="stage-eyebrow"><div class="stage-eyebrow-dot"></div>${s.eyebrow}</div>
      <h3 class="stage-title">${titleHTML}</h3>
      <p class="stage-desc">${s.desc}</p>
      <div class="stage-details">${detailsHTML}</div>
      <div class="stage-duration"><div class="stage-duration-bar"></div>${s.duration}</div>
    </div>`);
});

// ── Build the orbital ring: cards arranged in real 3D space around a center hub ──
STAGES.forEach((s,i)=>{
  const angle = (360 / N) * i;
  orbitRing.insertAdjacentHTML('beforeend', `
    <div class="orbit-card" data-idx="${i}" style="--face-c:${s.color};
      transform:rotateY(${angle}deg) translateZ(${RADIUS}px)">
      <div class="oc-num">${String(s.num).padStart(2,'0')}</div>
      <div class="oc-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${ICONS[s.id]}</svg></div>
      <div class="oc-label">${s.label}</div>
    </div>`);
});

let active = 0;
const prevBtn = $('sn-prev');
const nextBtn = $('sn-next');
const orbitGround = $('orbit-ground');

function setStage(idx){
  idx = Math.max(0, Math.min(N-1, idx));
  active = idx;
  const s = STAGES[idx];

  root.style.setProperty('--stage-c', s.color);

  document.querySelectorAll('.wf-node').forEach((n,i)=>{
    n.classList.toggle('active', i===idx);
    n.classList.toggle('done', i<idx);
    const line = n.querySelector('.wf-line');
    if (line) line.classList.toggle('done', i<=idx && i>0);
  });

  document.querySelectorAll('.stage-panel').forEach((p,i)=> p.classList.toggle('active', i===idx));

  document.querySelectorAll('.orbit-card').forEach((c,i)=>{
    const isActive = i === idx;
    c.classList.toggle('is-active', isActive);
    c.style.opacity = isActive ? '1' : '0.42';
    c.style.filter = isActive ? 'none' : 'saturate(.7) brightness(.75)';
  });

  // Rotate the whole ring so the active card faces the camera dead-on.
  const angle = -(360 / N) * idx;
  orbitRing.style.transform = `rotateY(${angle}deg)`;

  if (orbitGround) orbitGround.style.background =
    `radial-gradient(ellipse, color-mix(in srgb, ${s.color} 42%, transparent) 0%, transparent 70%)`;

  if (prevBtn) prevBtn.disabled = idx === 0;
  if (nextBtn) nextBtn.disabled = idx === N - 1;
}

document.querySelectorAll('.wf-node').forEach(node=>{
  node.addEventListener('click', ()=>{ pauseAmbient(); setStage(+node.dataset.idx); });
});
document.querySelectorAll('.orbit-card').forEach(card=>{
  card.addEventListener('click', ()=>{ pauseAmbient(); setStage(+card.dataset.idx); });
});
if (prevBtn) prevBtn.addEventListener('click', ()=>{ pauseAmbient(); setStage(active-1); });
if (nextBtn) nextBtn.addEventListener('click', ()=>{ pauseAmbient(); setStage(active+1); });

function pauseAmbient(){
  orbitRing.classList.add('paused');
}

// Keyboard support, only while the section is in view.
document.addEventListener('keydown', (e)=>{
  const stageEl = $('process') || document.getElementById('process');
  if (!stageEl) return;
  const r = stageEl.getBoundingClientRect();
  const inView = r.top < window.innerHeight && r.bottom > 0;
  if (!inView) return;
  if (e.key === 'ArrowRight'){ pauseAmbient(); setStage(active+1); }
  if (e.key === 'ArrowLeft'){ pauseAmbient(); setStage(active-1); }
});

// Gentle auto-advance through stages, paused on any interaction / off-screen.
let autoTimer = null, userInteracted = false;
function scheduleAuto(){
  clearTimeout(autoTimer);
  if (userInteracted) return;
  autoTimer = setTimeout(()=>{
    setStage(active < N-1 ? active+1 : 0);
    scheduleAuto();
  }, 4200);
}
const processSection = document.getElementById('process');
if (processSection){
  ['click','touchstart','wheel'].forEach(evt=>{
    processSection.addEventListener(evt, ()=>{ userInteracted = true; pauseAmbient(); clearTimeout(autoTimer); }, {passive:true});
  });
  if ('IntersectionObserver' in window){
    const io = new IntersectionObserver(([entry])=>{
      if (entry.isIntersecting && !userInteracted) scheduleAuto();
      else clearTimeout(autoTimer);
    }, {threshold:0.4});
    io.observe(processSection);
  } else {
    scheduleAuto();
  }
}

setStage(0);

} catch (err) {
  // If anything above throws, make sure the section still reads as
  // intentional content rather than a blank/broken area.
  const stageEl = document.getElementById('process');
  if (stageEl) {
    const fallback = document.createElement('div');
    fallback.style.cssText = 'position:relative;z-index:2;max-width:680px;margin:48px auto 0;text-align:center;color:#9090A8;font-size:15px;line-height:1.7';
    fallback.textContent = 'Our process: Discover → Strategy → Design → Develop → Launch → Scale.';
    stageEl.appendChild(fallback);
  }
  if (window.console) console.error('process section error:', err);
}

})();
</script>
